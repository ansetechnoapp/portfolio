name: SEO Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  seo-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: bun install --frozen-lockfile
    
    - name: Run SEO analysis
      run: bun run seo:analyze
    
    - name: Check sitemap
      run: bun run seo:pre-deploy
    
    - name: Build site
      run: bun run build
      
    - name: Archive SEO reports
      uses: actions/upload-artifact@v3
      with:
        name: seo-reports
        path: |
          public/sitemap.xml
          unused_images.txt
